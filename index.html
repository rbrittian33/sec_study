<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Security+ SY0-701 study app — built with love by Russ for Paige.">
<meta name="theme-color" content="#0d1b2a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
<title>Security+ SY0-701 — Study with Paige</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

/* ── PALETTE ──
   Navy:  #0d1b2a  #1b2d42  #243447  #2e4057
   Rose:  #e8637a  #f07c8e  #f5a0ae  #fce4e8
   Coral: #f4845f  #f9a07d  #fbbda5
   Gold:  #f5c842  #f7d468  #fae8a0
   Teal:  #2fb8ac  #5acec4  #a0e6e2
   Neutral: #8fa3b1  #c4d0d8  #e8edf0  #f4f7f9
*/
:root{
  --navy:     #0d1b2a;
  --navy2:    #1b2d42;
  --navy3:    #243447;
  --navy4:    #2e4057;
  --navy5:    #3a5068;
  --rose:     #e8637a;
  --rose2:    #f07c8e;
  --rose3:    #f5a0ae;
  --rose4:    #fce4e8;
  --coral:    #f4845f;
  --coral2:   #f9a07d;
  --gold:     #f5c842;
  --gold2:    #f7d468;
  --teal:     #2fb8ac;
  --teal2:    #5acec4;
  --grn:      #4caf82;
  --grn2:     #72c99f;
  --red:      #e05252;
  --amb:      #e09b34;
  --t1:       #f0f4f7;
  --t2:       #8fa3b1;
  --t3:       #4a6070;
  --bdr:      rgba(255,255,255,0.07);
  --bdr2:     rgba(255,255,255,0.13);
  --bdr3:     rgba(255,255,255,0.22);
  --rad:      8px;
  --radl:     12px;
  --radx:     16px;
  --shadow:   0 4px 24px rgba(0,0,0,0.3);
  --shadowsm: 0 2px 8px rgba(0,0,0,0.2);
}
body{
  font-family:'Sora',system-ui,sans-serif;
  background:var(--navy);
  color:var(--t1);
  min-height:100vh;
  font-size:15px;
  line-height:1.6;
}
#root{max-width:840px;margin:0 auto;padding:1.5rem 1.25rem 5rem}

/* ── ANIMATED BG GRADIENT ── */
body::before{
  content:'';
  position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(232,99,122,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 90%, rgba(47,184,172,0.06) 0%, transparent 60%),
    var(--navy);
  pointer-events:none;
}

/* ── TYPOGRAPHY ── */
h1{font-size:24px;font-weight:600;letter-spacing:-0.4px}
h2{font-size:18px;font-weight:600;letter-spacing:-0.2px}
h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--t3)}
code{font-family:'IBM Plex Mono',monospace;font-size:0.88em;background:var(--navy3);padding:1px 5px;border-radius:4px;color:var(--rose3)}

/* ── BUTTONS ── */
button{font-family:'Sora',inherit;cursor:pointer;transition:all 0.18s}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--rad);border:1px solid var(--bdr2);background:var(--navy3);color:var(--t1);font-size:13px;font-weight:500}
.btn:hover{background:var(--navy4);border-color:var(--bdr3);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:0.35;cursor:not-allowed;transform:none}
.btn-rose{background:linear-gradient(135deg,var(--rose),var(--coral));border:none;color:#fff;font-weight:600}
.btn-rose:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-teal{background:linear-gradient(135deg,var(--teal),var(--teal2));border:none;color:#fff;font-weight:600}
.btn-teal:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--coral2));border:none;color:var(--navy);font-weight:600}
.btn-gold:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 8px;font-size:11px}
.btn-ghost{background:transparent;border-color:transparent;color:var(--t2)}
.btn-ghost:hover{background:var(--navy3);color:var(--t1);border-color:var(--bdr2);transform:none}
.btn-danger{border-color:rgba(224,82,82,0.4);color:var(--red);background:transparent}
.btn-danger:hover{background:rgba(224,82,82,0.1)}

/* ── CARDS ── */
.card{background:var(--navy2);border:1px solid var(--bdr);border-radius:var(--radl);padding:1.25rem}
.card-glass{background:rgba(27,45,66,0.7);backdrop-filter:blur(12px);border:1px solid var(--bdr2);border-radius:var(--radl);padding:1.25rem}
.card-header{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--navy3);border-bottom:1px solid var(--bdr);border-radius:var(--radl) var(--radl) 0 0}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.02em}
.badge-rose  {background:rgba(232,99,122,0.15);border:1px solid rgba(232,99,122,0.4);color:var(--rose2)}
.badge-teal  {background:rgba(47,184,172,0.15);border:1px solid rgba(47,184,172,0.4);color:var(--teal2)}
.badge-gold  {background:rgba(245,200,66,0.15);border:1px solid rgba(245,200,66,0.4);color:var(--gold)}
.badge-green {background:rgba(76,175,130,0.15);border:1px solid rgba(76,175,130,0.4);color:var(--grn2)}
.badge-red   {background:rgba(224,82,82,0.15);border:1px solid rgba(224,82,82,0.4);color:var(--red)}
.badge-gray  {background:var(--navy3);border:1px solid var(--bdr2);color:var(--t2)}
.badge-navy  {background:rgba(46,64,87,0.6);border:1px solid var(--bdr2);color:var(--t2)}

/* ── PROGRESS ── */
.prog{height:4px;background:var(--navy4);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width 0.4s ease;background:linear-gradient(90deg,var(--rose),var(--coral))}


/* ── TABS ── */
.tabs{display:flex;gap:2px;background:var(--navy3);padding:3px;border-radius:var(--rad)}
.tab{flex:1;padding:7px 10px;text-align:center;font-size:13px;border-radius:6px;cursor:pointer;color:var(--t2);border:none;background:transparent;font-family:'Sora',inherit;transition:all 0.15s;font-weight:400}
.tab:hover{color:var(--t1)}
.tab.active{background:var(--navy4);color:var(--t1);font-weight:600;border:1px solid var(--bdr2)}

/* ── MODE CARDS ── */
.mode-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin:1rem 0}
.mode-card{padding:16px;border:1px solid var(--bdr);border-radius:var(--radl);cursor:pointer;transition:all 0.2s;background:var(--navy2);position:relative;overflow:hidden}
.mode-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.2s;background:linear-gradient(135deg,rgba(232,99,122,0.06),rgba(47,184,172,0.06))}
.mode-card:hover{border-color:var(--bdr2);transform:translateY(-2px);box-shadow:var(--shadowsm)}
.mode-card:hover::before{opacity:1}
.mode-card.sel{border-color:var(--rose);background:rgba(232,99,122,0.08);box-shadow:0 0 0 1px rgba(232,99,122,0.2)}
.mode-icon{font-size:22px;margin-bottom:10px}
.mode-title{font-size:13px;font-weight:600;margin-bottom:5px;color:var(--t1)}
.mode-desc{font-size:11px;color:var(--t2);line-height:1.55}

/* ── DOMAIN CHIPS ── */
.chip-row{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--bdr2);font-size:12px;font-weight:500;cursor:pointer;color:var(--t2);background:var(--navy3);transition:all 0.15s}
.chip:hover{border-color:var(--rose3);color:var(--t1)}
.chip.active{background:rgba(232,99,122,0.15);border-color:var(--rose);color:var(--rose2)}

/* ── QUESTION ── */
.domain-tag{font-size:10px;color:var(--t3);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:8px;display:block;font-weight:600}
.q-text{font-size:15px;line-height:1.75;color:var(--t1);margin-bottom:1.1rem}
.multi-hint{font-size:12px;color:var(--amb);margin-bottom:10px;font-style:italic;font-weight:500}

/* ── OPTIONS ── */
.options{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:12px;padding:11px 16px;border-radius:var(--rad);border:1px solid var(--bdr);background:var(--navy2);color:var(--t1);font-size:14px;cursor:pointer;transition:all 0.15s;text-align:left;font-family:'Sora',inherit;line-height:1.55}
.opt:hover:not(:disabled){background:var(--navy3);border-color:var(--bdr2);transform:translateX(2px)}
.opt.sel{border-color:var(--rose3);background:rgba(232,99,122,0.08)}
.opt.correct{background:rgba(76,175,130,0.12);border-color:rgba(76,175,130,0.5);color:var(--grn2)}
.opt.wrong{background:rgba(224,82,82,0.1);border-color:rgba(224,82,82,0.4);color:var(--red)}
.opt-key{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;min-width:20px;opacity:0.45;margin-top:1px;flex-shrink:0}
.expl{margin-top:14px;padding:13px 16px;background:var(--navy3);border-left:3px solid var(--rose);border-radius:0 var(--rad) var(--rad) 0;font-size:13px;color:var(--t2);line-height:1.65}
.expl strong{color:var(--t1);font-weight:600}

/* ── TIMER / FLAG / NAV ── */
.timer{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;color:var(--t2)}
.timer.warn{color:var(--red);animation:timerPulse 1s ease-in-out infinite}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:0.6}}
.flag-btn{background:none;border:none;color:var(--t3);font-size:17px;cursor:pointer;padding:4px;transition:all 0.15s}
.flag-btn:hover,.flag-btn.flagged{color:var(--gold)}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:1.25rem;gap:8px;flex-wrap:wrap}
.q-grid{display:flex;flex-wrap:wrap;gap:4px;margin-top:1rem;max-height:120px;overflow-y:auto;padding:2px}
.q-dot{width:26px;height:26px;border-radius:5px;border:1px solid var(--bdr);font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);background:var(--navy3);transition:all 0.12s;font-weight:600}
.q-dot:hover{border-color:var(--bdr2);color:var(--t2)}
.q-dot.answered{background:var(--navy4);color:var(--t2);border-color:var(--bdr2)}
.q-dot.current{background:linear-gradient(135deg,var(--rose),var(--coral));color:#fff;border-color:transparent}
.q-dot.flagged{border-color:rgba(245,200,66,0.5);color:var(--gold)}
.q-dot.pbq{border-color:rgba(47,184,172,0.5);color:var(--teal2);font-size:8px}
.q-dot.correct-d{background:rgba(76,175,130,0.2);border-color:rgba(76,175,130,0.4);color:var(--grn2)}
.q-dot.wrong-d{background:rgba(224,82,82,0.15);border-color:rgba(224,82,82,0.35);color:var(--red)}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.stat-card{background:var(--navy3);border-radius:var(--rad);padding:14px;text-align:center;border:1px solid var(--bdr)}
.stat-num{font-size:26px;font-weight:600;font-family:'IBM Plex Mono',monospace;background:linear-gradient(135deg,var(--rose2),var(--coral2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-lbl{font-size:11px;color:var(--t2);margin-top:4px;font-weight:500}

/* ── DOMAIN BARS ── */
.dbar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.dbar-lbl{font-size:12px;color:var(--t2);min-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.dbar-track{flex:1;height:7px;background:var(--navy4);border-radius:4px;overflow:hidden}
.dbar-fill{height:100%;border-radius:4px;transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1)}
.dbar-pct{font-size:12px;font-weight:600;font-family:'IBM Plex Mono',monospace;min-width:36px;text-align:right}
.dbar-count{font-size:11px;color:var(--t3);min-width:40px;text-align:right}

/* ── WEAK AREAS ── */
.weak-domain{border:1px solid var(--bdr);border-radius:var(--radl);margin-bottom:12px;overflow:hidden}
.weak-domain-hdr{display:flex;align-items:center;gap:10px;padding:11px 15px;background:var(--navy3);border-bottom:1px solid var(--bdr);cursor:pointer;user-select:none;transition:background 0.15s}
.weak-domain-hdr:hover{background:var(--navy4)}
.weak-domain-body{padding:14px 16px}
.concept-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bdr)}
.concept-row:last-child{border-bottom:none}
.concept-name{font-size:12px;color:var(--t1);min-width:170px;font-weight:500}
.concept-bar-track{flex:1;height:5px;background:var(--navy4);border-radius:3px;overflow:hidden}
.concept-bar-fill{height:100%;border-radius:3px}
.concept-wrong{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--red);min-width:28px;text-align:right;font-weight:600}

/* ── DRILL ── */
.drill-header{background:linear-gradient(135deg,rgba(245,200,66,0.08),rgba(244,132,95,0.08));border:1px solid rgba(245,200,66,0.25);border-radius:var(--radl);padding:13px 16px;margin-bottom:1rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* ── REVIEW ── */
.review-item{border:1px solid var(--bdr);border-radius:var(--radl);padding:1rem;margin-bottom:10px;transition:border-color 0.15s}
.review-item.correct{border-color:rgba(76,175,130,0.4)}
.review-item.wrong{border-color:rgba(224,82,82,0.35)}
.review-item.skipped{border-color:var(--bdr2)}

/* ── PBQ ── */
.pbq-wrap{border:1px solid var(--bdr2);border-radius:var(--radl);overflow:hidden}
.pbq-body{padding:18px}
.diagram-hint{font-size:12px;color:var(--t2);font-style:italic;margin-bottom:10px;font-weight:500}
.log-table{width:100%;border-collapse:collapse;font-size:12px;font-family:'IBM Plex Mono',monospace}
.log-table th{padding:8px 10px;text-align:left;font-size:11px;color:var(--t2);font-weight:600;border-bottom:1px solid var(--bdr);background:var(--navy3);font-family:'Sora',sans-serif;letter-spacing:0.04em;text-transform:uppercase}
.log-table td{padding:7px 10px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background 0.12s}
.log-table tr:hover td{background:var(--navy3)}
.log-table tr.row-sel td{background:var(--navy4)}
.log-table tr.row-ok td{background:rgba(76,175,130,0.1);color:var(--grn2)}
.log-table tr.row-bad td{background:rgba(224,82,82,0.1);color:var(--red)}
.acl-grid-hdr{display:grid;grid-template-columns:68px 70px 1fr 1fr 58px 48px 80px;gap:5px;margin-bottom:5px}
.acl-head{font-size:10px;color:var(--t3);font-weight:600;padding:0 4px;text-transform:uppercase;letter-spacing:0.06em}
.acl-row-wrap{display:grid;grid-template-columns:68px 70px 1fr 1fr 58px 48px 80px;gap:5px;align-items:center;margin-bottom:5px;padding:6px;border-radius:var(--rad);border:1px solid var(--bdr);background:var(--navy3)}
.acl-row-wrap.row-ok{border-color:rgba(76,175,130,0.4);background:rgba(76,175,130,0.08)}
.acl-row-wrap.row-bad{border-color:rgba(224,82,82,0.35);background:rgba(224,82,82,0.08)}
.acl-sel,.acl-inp{width:100%;padding:5px 7px;border-radius:5px;border:1px solid var(--bdr2);background:var(--navy2);color:var(--t1);font-size:11px;font-family:'IBM Plex Mono',monospace}
.acl-sel:focus,.acl-inp:focus{outline:none;border-color:var(--rose)}
.rbac-table{width:100%;border-collapse:collapse;font-size:12px}
.rbac-table th{padding:8px 10px;background:var(--navy3);border-bottom:1px solid var(--bdr);font-size:11px;font-weight:600;color:var(--t2);text-align:center;text-transform:uppercase;letter-spacing:0.05em}
.rbac-table th:first-child{text-align:left}
.rbac-table td{padding:7px 10px;border-bottom:1px solid var(--bdr);text-align:center;cursor:pointer;transition:background 0.12s}
.rbac-table td:first-child{text-align:left;font-size:12px;cursor:default}
.rbac-table td:hover:not(:first-child){background:var(--navy3)}
.rbac-table td.c-ok{background:rgba(76,175,130,0.1)}
.rbac-table td.c-bad{background:rgba(224,82,82,0.1)}
.rbac-table td.c-miss{background:rgba(224,155,52,0.1)}


/* ── AUTH SCREEN ── */
#auth-screen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center}
#auth-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 30% 40%,rgba(232,99,122,0.12) 0%,transparent 60%),var(--navy);z-index:-1}
.auth-box{width:360px;background:rgba(27,45,66,0.9);backdrop-filter:blur(20px);border:1px solid var(--bdr2);border-radius:var(--radx);padding:2.25rem;box-shadow:var(--shadow)}
.auth-logo{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1.75rem;display:flex;align-items:center;gap:6px}
.auth-logo span{width:6px;height:6px;border-radius:50%;background:var(--rose);display:inline-block}
.auth-heart{font-size:28px;margin-bottom:10px}
.auth-title{font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-0.3px}
.auth-sub{font-size:13px;color:var(--t2);margin-bottom:1.75rem;line-height:1.6}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px;letter-spacing:0.04em;text-transform:uppercase}
.auth-field input{width:100%;padding:10px 14px;background:var(--navy3);border:1px solid var(--bdr2);border-radius:var(--rad);color:var(--t1);font-size:14px;font-family:'Sora',inherit;transition:border-color 0.15s}
.auth-field input:focus{outline:none;border-color:var(--rose);box-shadow:0 0 0 3px rgba(232,99,122,0.12)}
.auth-err{font-size:12px;color:var(--red);margin-bottom:12px;min-height:18px;font-weight:500}
.auth-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--rose),var(--coral));border:none;border-radius:var(--rad);color:#fff;font-size:14px;font-weight:700;font-family:'Sora',inherit;cursor:pointer;transition:all 0.18s;letter-spacing:0.02em}
.auth-btn:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 8px 20px rgba(232,99,122,0.3)}

/* ── LOAD OVERLAY ── */
#load-overlay{position:fixed;inset:0;z-index:8888;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--navy);gap:0}
#file-input{display:none}
.load-drop-zone{border:2px dashed var(--bdr2);border-radius:var(--radx);padding:3rem 2.5rem;text-align:center;max-width:380px;cursor:pointer;transition:all 0.2s}
.load-drop-zone:hover{border-color:var(--rose);background:rgba(232,99,122,0.04)}
.load-drop-zone h2{margin-bottom:8px}
.load-drop-zone p{font-size:13px;color:var(--t2);line-height:1.6}

/* ── HOME HERO ── */
.home-hero{margin-bottom:1.5rem;padding:1.5rem 0 0.5rem}
.home-greeting{font-size:13px;color:var(--rose3);font-weight:600;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:6px}
.home-title{font-size:28px;font-weight:700;letter-spacing:-0.5px;line-height:1.2;margin-bottom:8px}
.home-sub{font-size:14px;color:var(--t2);line-height:1.6}

/* ── SCORE RING ── */
.score-ring-wrap{display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem;flex-wrap:wrap}

/* ── LOGOUT ── */
.logout-btn{position:fixed;top:14px;right:14px;z-index:100}


/* ── MARATHON PROGRESS ── */
.marathon-bar-wrap{background:var(--navy3);border:1px solid var(--bdr);border-radius:var(--rad);padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}

<script>
'use strict';
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ══════════════════════════════════════════════════════════
   AUTH  — SHA-256 hashed credentials
   To change: update SALT, USER_HASH, PASS_HASH.
   Hash = sha256(SALT + value)  via https://emn178.github.io/online-tools/sha256.html
   Current: Paige (case-insensitive) / Cleveland
══════════════════════════════════════════════════════════ */
const SALT='nx7s4lt';
const UH='06d8e5eb1b919c2ecc4fea92b3694ce15c627bfa12dd92ea4b776671c1a020d4';
const PH='1f729fad5b5ae29cb96d8828a9e4d563fb6404ef7d2a9badf959e0e92075ea1e';
const AK='sx701_auth';

async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
function isAuthed(){return sessionStorage.getItem(AK)==='1';}
function doLogout(){sessionStorage.clear();location.reload();}

document.getElementById('auth-submit').addEventListener('click',async()=>{
  try {
    const u=document.getElementById('auth-user').value.trim();
    const p=document.getElementById('auth-pass').value;

    if (!window.crypto || !window.crypto.subtle) {
      throw new Error("Secure context required. Ensure GitHub Pages 'Enforce HTTPS' is checked.");
    }

    const [uh,ph]=await Promise.all([sha256(SALT+u.toLowerCase()),sha256(SALT+p)]);
    if(uh===UH&&ph===PH){
      sessionStorage.setItem(AK,'1');
      document.getElementById('auth-screen').style.display='none';
      document.getElementById('logout-btn').style.display='';
      initApp();
    } else {
      document.getElementById('auth-err').textContent='Invalid username or password.';
    }
  } catch(err) {
    document.getElementById('auth-err').textContent = err.message || "An error occurred during login.";
    console.error("Auth Error:", err);
  }
});
['auth-pass','auth-user'].forEach((id,i)=>document.getElementById(id).addEventListener('keydown',e=>{
  if(e.key==='Enter')i===0?document.getElementById('auth-submit').click():document.getElementById('auth-pass').focus();
}));

/* ══════════════════════════════════════════════════════════
   PERSISTENT PROGRESS (localStorage)
══════════════════════════════════════════════════════════ */
const PROG_KEY='sx701_progress';
const DEFAULT_PROG={sessions:0,bestScore:0,marathonIdx:0,marathonAnswers:{},domainStats:{},wrongIds:[],lifetimeCorrect:0,lifetimeTotal:0,lastSeen:null};

function loadProgress(){
  try{const s=localStorage.getItem(PROG_KEY);return s?{...DEFAULT_PROG,...JSON.parse(s)}:DEFAULT_PROG;}
  catch(e){return DEFAULT_PROG;}
}
function saveProgress(p){
  try{localStorage.setItem(PROG_KEY,JSON.stringify({...p,lastSeen:new Date().toISOString()}));}catch(e){}
}
</script>

<script>
'use strict';
/* ══════════════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════════════ */
function seededRng(seed){let s=seed%2147483647;if(s<=0)s+=2147483646;return()=>{s=s*16807%2147483647;return(s-1)/2147483646;};}
function fmtTime(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function isPBQ(q){return q&&typeof q.id==='string'&&q.id.startsWith('pbq');}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function normalizeQ(q){return{id:q.id,q:q.question||q.q,o:q.options||q.o,a:q.answer||q.a,t:q.answer_type||q.t||'single',e:q.explanation||q.e||'',d:q.domain||q.d||''};}

function buildExam(allQ,seed,domainFilter,mode){
  const rng=seededRng(seed);
  if(mode==='pbq')return PBQS;
  if(mode==='marathon'){
    const all=allQ.map(normalizeQ);
    return all;
  }
  let pool=allQ.map(normalizeQ);
  if(domainFilter&&domainFilter.length)pool=pool.filter(q=>domainFilter.includes(q.d));
  const byD={};DOMAINS.forEach(d=>{byD[d]=pool.filter(q=>q.d===d);});
  const pct={'1.0 General Security Concepts':0.12,'2.0 Threats, Vulnerabilities, and Mitigations':0.26,'3.0 Security Architecture':0.20,'4.0 Security Operations':0.26,'5.0 Security Program Management and Oversight':0.16};
  const totalMC=Math.min(85,pool.length);
  const sel=[];
  DOMAINS.forEach(d=>{
    const avail=byD[d]||[];
    const need=domainFilter&&domainFilter.length?avail.length:Math.round(totalMC*(pct[d]||0.2));
    sel.push(...[...avail].sort(()=>rng()-0.5).slice(0,Math.min(need,avail.length)));
  });
  const mc=sel.sort(()=>rng()-0.5);
  if(mode==='practice'||mode==='study')return mc;
  return[...PBQS,...mc];
}

function buildDrill(questions,answers){
  return questions.filter(q=>isPBQ(q)?!pbqCorrect(q,answers[q.id]):!mcCorrect(q,answers[q.id])).map(q=>isPBQ(q)?q:normalizeQ(q));
}

function mcCorrect(q,ans){
  if(ans===undefined||ans===null)return false;
  const ca=Array.isArray(q.a)?q.a:[q.a];
  if(Array.isArray(ans)){if(ans.length!==ca.length)return false;return ca.every(c=>ans.includes(c));}
  return ans===q.a;
}

function pbqCorrect(pbq,ans){
  if(!ans)return false;
  if(pbq.type==='HOTSPOT'){
    if(pbq.subtype==='diagram')return ans.selected===pbq.diagram.correct;
    if(pbq.subtype==='table')return pbq.table.rows.find(r=>r.id===ans.selected)?.correct===true;
  }
  if(pbq.type==='SIMULATION'&&pbq.subtype==='acl'){
    const rules=ans.aclRules||[];if(rules.length!==pbq.correctRules.length)return false;
    return pbq.correctRules.every((cr,i)=>{const r=rules[i];return r&&r.action===cr.action&&r.proto===cr.proto&&r.src===cr.src&&r.dst===cr.dst&&r.port===cr.port&&(r.dir||'in')===(cr.dir||'in');});
  }
  if(pbq.type==='SIMULATION'&&pbq.subtype==='rbac'){
    const sel=ans.rbacSelections||{};
    for(const u of pbq.users)for(const p of pbq.allPerms){const k=`${u.name}|${p}`;if(!!sel[k]!==u.needs.includes(p))return false;}
    return true;
  }
  if(pbq.subtype==='vpn')return vpnCorrect(pbq,ans);
  if(pbq.subtype==='netdiag')return netdiagCorrect(pbq,ans);
  if(pbq.subtype==='resiliency')return resilCorrect(pbq,ans);
  return false;
}

function calcResults(questions,answers){
  let total=0,correct=0;
  const byD={};DOMAINS.forEach(d=>{byD[d]={total:0,correct:0,wrong:[]};});
  questions.forEach(q=>{
    total++;
    const domain=isPBQ(q)?q.domain:q.d;
    if(!byD[domain])byD[domain]={total:0,correct:0,wrong:[]};
    byD[domain].total++;
    const ok=isPBQ(q)?pbqCorrect(q,answers[q.id]):mcCorrect(q,answers[q.id]);
    if(ok)correct++;else byD[domain].wrong.push(q);
  });
  const pct=total>0?correct/total*100:0;
  // CompTIA scaled score: 100–900, pass at 750 (= 83.3% correct)
  const scaledScore=total>0?Math.max(100,Math.round((correct/total)*900)):100;
  return{total,correct,pct,scaledScore,byD};
}

function analyzeWeakConcepts(wrongQs){
  const res={};
  for(const[domain,concepts]of Object.entries(CONCEPT_MAP)){
    const dw=wrongQs.filter(q=>(isPBQ(q)?q.domain:q.d)===domain);
    if(!dw.length)continue;
    const cc={};
    for(const[concept,kws]of Object.entries(concepts)){
      let count=0;
      dw.forEach(q=>{const txt=((isPBQ(q)?q.q:q.q)||'').toLowerCase()+' '+((isPBQ(q)?'':q.e)||'').toLowerCase();if(kws.some(kw=>txt.includes(kw)))count++;});
      if(count>0)cc[concept]=count;
    }
    if(Object.keys(cc).length)res[domain]={total:dw.length,concepts:cc,questions:dw};
  }
  return res;
}

function netdiagCorrect(pbq,ans){
  if(!ans)return false;
  const sv=ans.slots||{};const subnet=ans.subnet||'';
  const areas={};
  pbq.slots.forEach(s=>{
    if(!areas[s.area])areas[s.area]={correct:[],placed:[]};
    areas[s.area].correct.push(s.correct);
    if(sv[s.id])areas[s.area].placed.push(sv[s.id]);
  });
  const slotsOk=Object.values(areas).every(a=>{
    if(a.correct.length!==a.placed.length)return false;
    const sc=[...a.correct].sort(),sp=[...a.placed].sort();
    return sc.every((v,i)=>v===sp[i]);
  });
  return slotsOk&&subnet===pbq.subnetDropdown.correct;
}

  const allWrong=questions.filter(q=>isPBQ(q)?!pbqCorrect(q,answers[q.id]):!mcCorrect(q,answers[q.id]));
  const filtered=questions.filter(q=>{
    const id=q.id;const pb=isPBQ(q);
    const ok=pb?pbqCorrect(q,answers[id]):mcCorrect(q,answers[id]);
    if(tab==='wrong')return!ok;if(tab==='correct')return ok;
    if(tab==='flagged')return flags.has(id);if(tab==='pbq')return pb;
    return true;
  });
  const{scaledScore}=calcResults(questions,answers);
  return React.createElement('div',null,
    React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:'0.75rem',flexWrap:'wrap'}},
      allWrong.length>0&&React.createElement('button',{className:'btn btn-sm btn-gold',onClick:()=>onDrill(null)},'🎯 Drill missed'),
      React.createElement('span',{className:`badge ${scaledScore>=750?'badge-green':'badge-red'}`,style:{marginLeft:'auto'}},`${scaledScore}/900`)
    ),
    React.createElement('div',{className:'tabs',style:{marginBottom:'1rem'}},
      [{v:'wrong',l:`Wrong (${allWrong.length})`},{v:'correct',l:'Correct'},{v:'all',l:'All'},{v:'flagged',l:'Flagged'},{v:'pbq',l:'PBQs'}].map(({v,l})=>
        React.createElement('button',{key:v,className:`tab${tab===v?' active':''}`,onClick:()=>setTab(v)},l)
      )
    ),
    React.createElement('p',{style:{fontSize:12,color:'#8fa3b1',marginBottom:12}},`${filtered.length} question${filtered.length!==1?'s':''}`),
    filtered.map((q,i)=>{
      const id=q.id;const pb=isPBQ(q);
      const ok=pb?pbqCorrect(q,answers[id]):mcCorrect(q,answers[id]);
      const hasAns=pb?(answers[id]&&(answers[id].selected!==undefined||answers[id].aclRules||answers[id].rbacSelections)):answers[id]!==undefined;
      let cls='review-item';if(!hasAns)cls+=' skipped';else if(ok)cls+=' correct';else cls+=' wrong';
      return React.createElement('div',{key:id,className:cls},
        React.createElement('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:10,flexWrap:'wrap'}},
          React.createElement('span',{className:`badge ${!hasAns?'badge-gray':ok?'badge-green':'badge-red'}`},!hasAns?'Skipped':ok?'✓ Correct':'✗ Wrong'),
          pb&&React.createElement('span',{className:'badge badge-teal'},'PBQ'),
          flags.has(id)&&React.createElement('span',{style:{color:'#f5c842'}},`⚑`),
          React.createElement('span',{style:{fontSize:11,color:'#4a6070',marginLeft:'auto'}},`Q${i+1}`)
        ),
        pb?React.createElement(PBQQuestion,{pbq:q,answer:answers[id]||{},onAnswer:()=>{},revealed:true})
          :React.createElement(MCQuestion,{q,answer:answers[id],onAnswer:()=>{},revealed:true})
      );
    })
  );
}

        React.createElement('p',{style:{fontSize:15,fontWeight:700,color:'#f0f4f7',margin:'0 0 8px',lineHeight:1.4}},'Congratulations, my Love! 🎊'),
        React.createElement('p',{style:{fontSize:13,color:'#c8dbe8',margin:0,lineHeight:1.65}},
          'Congratulations my Love 🥹💍 I am so proud of you baby. I knew you could do it. I can\'t wait to marry you and be by the lake in Arkansas. You\'re truly amazing baby and you make me the luckiest man alive. 💙🎉'
        )
      ),
      React.createElement('div',{className:'stat-grid',style:{marginBottom:'1.25rem'}},
        [{l:'Correct',v:correct,c:pass?'#4caf82':undefined},{l:'Wrong',v:total-correct-unanswered,c:total-correct-unanswered>0?'#e05252':undefined},{l:'Skipped',v:unanswered},{l:'Score',v:`${scaledScore}/900`,c:pass?'#4caf82':'#e05252'}]
        .map(s=>React.createElement('div',{key:s.l,className:'stat-card'},
          React.createElement('div',{className:'stat-num',style:s.c?{background:'none',WebkitTextFillColor:s.c,color:s.c}:{}},s.v),
          React.createElement('div',{className:'stat-lbl'},s.l)
        ))
      ),
      React.createElement('div',{className:'tabs',style:{marginBottom:'1.25rem'}},
        [{v:'score',l:'📊 Domain Scores'},{v:'weak',l:'🔍 Weak Areas'},{v:'review',l:'📋 Review'}].map(({v,l})=>
          React.createElement('button',{key:v,className:`tab${resultsTab===v?' active':''}`,onClick:()=>setResultsTab(v)},l)
        )
      ),
      resultsTab==='score'&&React.createElement('div',null,
        progress.lifetimeTotal>0&&React.createElement('div',null,
          React.createElement('h3',{style:{marginBottom:10}},'All-time stats'),
          React.createElement('div',{className:'lt-grid'},
            [{l:'Lifetime Answered',v:(progress.lifetimeTotal||0).toLocaleString()},
             {l:'Lifetime Correct',v:(progress.lifetimeCorrect||0).toLocaleString()},
             {l:'Lifetime Accuracy',v:progress.lifetimeTotal?`${Math.round((progress.lifetimeCorrect||0)/progress.lifetimeTotal*100)}%`:'—'},
             {l:'Questions Missed',v:(progress.wrongIds||[]).length},
            ].map(s=>React.createElement('div',{key:s.l,className:'lt-card'},
              React.createElement('div',{className:'lt-num'},s.v),React.createElement('div',{className:'lt-lbl'},s.l)
            ))
          )
        ),
        React.createElement('h3',{style:{marginBottom:12,marginTop:progress.lifetimeTotal>0?'1.25rem':0}},'This session — by domain'),
        React.createElement('div',{style:{marginBottom:'1.5rem'}},
          DOMAINS.map((d,i)=>{
            const st=byD[d]||{total:0,correct:0};if(!st.total)return null;
            const dp=st.total>0?st.correct/st.total*100:0;
            const col=dp>=75?'#4caf82':dp>=50?'#e09b34':'#e05252';
            return React.createElement('div',{key:d,className:'dbar-row'},
              React.createElement('span',{className:'dbar-lbl'},DSHORT[i]),
              React.createElement('div',{className:'dbar-track'},React.createElement('div',{className:'dbar-fill',style:{width:`${dp}%`,background:col}})),
              React.createElement('span',{className:'dbar-pct',style:{color:col}},`${Math.round(dp)}%`),
              React.createElement('span',{className:'dbar-count'},`${st.correct}/${st.total}`)
            );
          })
        ),
        Object.keys(progress.domainStats||{}).length>0&&React.createElement('div',null,
          React.createElement('h3',{style:{margin:'1.25rem 0 10px'}},'All-time accuracy by domain'),
          DOMAINS.map((d,i)=>{
            const st=(progress.domainStats||{})[d];if(!st||!st.total)return null;
            const dp=st.correct/st.total*100;
            const col=dp>=75?'#4caf82':dp>=50?'#e09b34':'#e05252';
            return React.createElement('div',{key:d,className:'dbar-row'},
              React.createElement('span',{className:'dbar-lbl'},DSHORT[i]),
              React.createElement('div',{className:'dbar-track'},React.createElement('div',{className:'dbar-fill',style:{width:`${dp}%`,background:col}})),
              React.createElement('span',{className:'dbar-pct',style:{color:col}},`${Math.round(dp)}%`),
              React.createElement('span',{className:'dbar-count'},`${st.correct}/${st.total}`)
            );
          })
        ),
        React.createElement('div',{style:{display:'flex',gap:10,flexWrap:'wrap'}},
          allWrongQs.length>0&&React.createElement('button',{className:'btn btn-gold',onClick:()=>startDrill(null)},'🎯 Drill missed'),
          React.createElement('button',{className:'btn btn-rose',onClick:newExam},'↺ New exam'),
          isDrill&&React.createElement('button',{className:'btn',onClick:startExam},'↺ Full exam')
        )
      ),
      resultsTab==='weak'&&React.createElement(WeakAreasPanel,{analysis,onDrill:startDrill}),
      resultsTab==='review'&&React.createElement(ReviewPanel,{questions,answers,flags,onDrill:startDrill})
    );
  }

  return React.createElement('div',{style:{padding:'2rem',color:'#8fa3b1'}},'Loading...');
}

/* ══════════════════════════════════════════════════════════
   FILE LOADER + BOOTSTRAP
══════════════════════════════════════════════════════════ */

/* ── REACT ERROR BOUNDARY ──
   React 18 concurrent mode throws render errors asynchronously —
   a plain try/catch around appRoot.render() never fires.
   This class component is the only way to catch them. */
class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={err:null};}
  static getDerivedStateFromError(err){return{err};}
  componentDidCatch(err,info){console.error('React render error:',err,info);}
  render(){
    if(this.state.err){
      return React.createElement('div',{style:{padding:'2rem',color:'#e05252',textAlign:'center',background:'var(--navy2)',borderRadius:'var(--radl)',marginTop:'2rem',border:'1px solid #e05252'}},
        React.createElement('h3',null,'Application Render Error'),
        React.createElement('p',{style:{fontFamily:'monospace',marginTop:8,fontSize:13}},this.state.err.message||String(this.state.err)),
        React.createElement('p',{style:{fontSize:12,color:'#8fa3b1',marginTop:12}},'Open the browser console for full details.')
      );
    }
    return this.props.children;
  }
}

let appRoot=null;

function showErr(msg){const el=document.getElementById('load-err');if(el){el.textContent=msg;el.style.display='block';}}

function showLoading(){
  const root=document.getElementById('root');
  root.style.display='block';
  root.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;color:#8fa3b1">'
    +'<div style="font-size:36px">⏳</div>'
    +'<div style="font-size:14px;font-weight:500">Loading question bank…</div>'
    +'</div>';
}

function launchApp(data){
  const q=Array.isArray(data)?data:data.questions||[];
  if(!q||!q.length){showErr('JSON loaded, but no questions were found inside it.');return;}

  document.getElementById('load-overlay').style.display='none';
  document.getElementById('root').style.display='block';

  if(!appRoot)appRoot=ReactDOM.createRoot(document.getElementById('root'));
  appRoot.render(React.createElement(ErrorBoundary,null,React.createElement(App,{allQ:q})));

  // Cache after render is kicked off so it doesn't block the UI
  setTimeout(()=>{try{sessionStorage.setItem('sx701_q',JSON.stringify(data));}catch(e){}},0);
}

function initApp(){
  showLoading();
  fetch('./secplus_701_enriched.json')
    .then(r=>{
      if(!r.ok) throw new Error(`HTTP ${r.status}: JSON not found. Check filename casing!`);
      return r.json();
    })
    .then(data=>launchApp(data))
    .catch((err)=>{
      console.error("Initialization Error:", err);

      // Try sessionStorage cache before giving up
      try{
        const c=sessionStorage.getItem('sx701_q');
        if(c){launchApp(JSON.parse(c));return;}
      }catch(e){console.error("Session cache failed:",e);}

      // Nothing worked — show file picker with the error
      document.getElementById('root').style.display='none';
      document.getElementById('load-overlay').style.display='flex';
      showErr(`Could not load questions: ${err.message}`);
    });
}

document.getElementById('file-input').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{launchApp(JSON.parse(ev.target.result));}catch{showErr('Invalid JSON file.');}};
  r.readAsText(f);
});

document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();
  const f=e.dataTransfer.files[0];
  if(!f||!f.name.endsWith('.json')){showErr('Please drop a .json file.');return;}
  const r=new FileReader();
  r.onload=ev=>{try{launchApp(JSON.parse(ev.target.result));}catch{showErr('Invalid JSON.');}};
  r.readAsText(f);
});

// Boot
if(isAuthed()){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('logout-btn').style.display='';
  initApp();
}
</script>
